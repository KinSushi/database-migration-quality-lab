<svg width="1280" height="320" viewBox="0 0 1280 320" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="database migration quality lab banner">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1280" y2="320" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#07111F"/>
      <stop offset="0.55" stop-color="#0B1F3A"/>
      <stop offset="1" stop-color="#102A43"/>
    </linearGradient>
    <style>
      .title{font-family:Inter,Segoe UI,Arial,sans-serif;font-size:42px;font-weight:750;fill:#fff}
      .sub{font-family:Inter,Segoe UI,Arial,sans-serif;font-size:21px;fill:#D8E2F0}
      .chip{font-family:Inter,Segoe UI,Arial,sans-serif;font-size:14px;font-weight:650;fill:#fff}
      .node{font-family:Inter,Segoe UI,Arial,sans-serif;font-size:13px;fill:#D8E2F0}
    </style>
  </defs>
  <rect width="1280" height="320" rx="26" fill="url(#bg)"/>
  <g opacity=".38">
    <rect x="760" y="75" width="120" height="56" rx="12" fill="#0D419D" stroke="#58A6FF"/>
    <text x="790" y="110" class="node">Legacy</text>
    <rect x="930" y="75" width="120" height="56" rx="12" fill="#0F2F24" stroke="#2EA043"/>
    <text x="960" y="110" class="node">Target</text>
    <rect x="1100" y="75" width="120" height="56" rx="12" fill="#24143D" stroke="#A371F7"/>
    <text x="1122" y="110" class="node">Validate</text>
    <rect x="930" y="190" width="150" height="56" rx="12" fill="#24143D" stroke="#A371F7"/>
    <text x="960" y="225" class="node">Reconcile</text>
    <path d="M880 103 H930" stroke="#9FB3C8" stroke-width="3"/>
    <path d="M1050 103 H1100" stroke="#9FB3C8" stroke-width="3"/>
    <path d="M1160 131 C1160 176 1080 172 1080 218" stroke="#9FB3C8" stroke-width="3" fill="none"/>
  </g>
  <text x="74" y="104" class="title">database-migration-quality-lab</text>
  <text x="74" y="150" class="sub">Legacy-to-Target Migration · SQL Validation · Reconciliation</text>
  <text x="74" y="188" class="sub">Migration evidence for regulated and data-intensive environments</text>
  <rect x="74" y="232" width="116" height="36" rx="18" fill="#0D419D"/>
  <text x="102" y="255" class="chip">Legacy</text>
  <rect x="206" y="232" width="136" height="36" rx="18" fill="#1A7F37"/>
  <text x="234" y="255" class="chip">Validation</text>
  <rect x="358" y="232" width="152" height="36" rx="18" fill="#6E40C9"/>
  <text x="386" y="255" class="chip">Reconciliation</text>
